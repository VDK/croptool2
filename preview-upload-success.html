<!doctype html>
<html dir="ltr">
<head>
  <title>CropTool2 — RTL upload success preview</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #f5f5f5; padding: 20px; font-family: sans-serif; }
    .wrapper { max-width: 750px; margin: 0 auto; }

    /* OOUI-style field layout */
    .oo-ui-actionFieldLayout { display: flex; align-items: stretch; gap: 0; }
    .oo-ui-actionFieldLayout-input { flex: 1; min-width: 0; }
    .oo-ui-actionFieldLayout-input input {
      width: 100%; box-sizing: border-box; height: 32px; padding: 5px 8px;
      border: 1px solid #a2a9b1; border-right: 0; outline: 0;
      font-size: 13px; line-height: 1.4; font-family: inherit;
      background: #f8f9fa;
      border-radius: 2px 0 0 2px;
    }
    .oo-ui-actionFieldLayout-button {
      flex: 0 0 auto; position: relative;
    }
    .oo-ui-actionFieldLayout-button a {
      display: inline-flex; align-items: center; gap: 4px; height: 32px; box-sizing: border-box;
      padding: 0 12px; border: 1px solid #a2a9b1; background: #f8f9fa; color: #202122;
      cursor: pointer; text-decoration: none; font-size: 13px;
      border-radius: 0 2px 2px 0;
    }
    .oo-ui-actionFieldLayout-button a:hover { background: #fff; }

    .monospace { font-family: monospace; }
    .oo-ui-actionFieldLayout-input input.monospace { font-family: monospace; }

    /* RTL overrides */
    [dir="rtl"] .oo-ui-actionFieldLayout-input input {
      border-right: 1px solid #a2a9b1; border-left: 0;
      border-radius: 0 2px 2px 0;
    }
    [dir="rtl"] .oo-ui-actionFieldLayout-button a {
      border-radius: 2px 0 0 2px;
    }

    .upload-card {
      margin-top: 12px; padding: 6px; background: #fff; box-shadow: 2px 2px 2px #ccc;
    }
    .upload-field { margin-bottom: 12px; }
    .upload-field:last-of-type { margin-bottom: 0; }
    .upload-field label { display: block; margin-bottom: 4px; font-weight: 700; font-size: 13px; color: #202122; }

    .ct-icon { display: inline-flex; align-items: center; justify-content: center; width: 1em; height: 1em; color: currentColor; }
    .ct-icon svg { display: block; width: 1em; height: 1em; fill: currentColor; }
    .ct-icon-flip svg { transform: scaleX(-1); }

    .upload-success-block {
      display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; padding: 9px 10px;
      border: 1px solid #b7dfb7; background: #f0f8f0; color: #2f6b2f; border-radius: 4px; text-decoration: none;
    }
    .upload-success-block:hover { color: #2f6b2f; background: #e7f4e7; }
    .upload-success-copy { display: flex; flex-direction: column; gap: 2px; font-size: 13px; }

    .preview-img { max-width: 100%; max-height: min(48vh, 420px); }

    hr { margin: 30px 0; }
    h2, h3 { font-weight: 400; }
  </style>
</head>
<body>

<div class="wrapper">
  <h2>RTL preview — Upload success</h2>
  <p>Language: Arabic (العربية) — <code>dir="rtl"</code></p>

  <div class="upload-card" dir="rtl">
    <a class="upload-success-block" href="#">
      <span class="ct-icon"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M10 1a9 9 0 110 18 9 9 0 010-18M8.823 11.118 6.8 9.6l-1.2 1.6 2.8 2.1 1.381-.175 4.624-5.781-1.561-1.25z"/></g></svg></span>
      <span class="upload-success-copy">
        <strong>تم الرفع بنجاح</strong>
        <span>تم رفع الملف إلى كومنز</span>
      </span>
    </a>

    <div class="upload-field">
      <label>שם הקובץ</label>
      <div class="oo-ui-actionFieldLayout">
        <div class="oo-ui-actionFieldLayout-input">
          <input type="text" readonly value="Graham_McAllister_at_UX_Brighton_2010_(5009349106)_cropped.jpg">
        </div>
        <span class="oo-ui-actionFieldLayout-button">
          <a>
            <span class="ct-icon ct-icon-flip"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M13 19H1V7h6V1h12v12h-6zm-6-6V9H3v8h8v-4zm2-2h8V3H9z"/></g></svg></span>
            <span class="oo-ui-labelElement-label">نسخ</span>
          </a>
        </span>
      </div>
    </div>

    <div class="upload-field">
      <label>لاستخدام الملف في الويكي، انسخ هذا النص إلى صفحة:</label>
      <div class="oo-ui-actionFieldLayout">
        <div class="oo-ui-actionFieldLayout-input">
          <input class="monospace" type="text" readonly value="[[File:Graham_McAllister_at_UX_Brighton_2010_(5009349106)_cropped.jpg|thumb|Dr Graham McAllister at UX Brighton 2010]]">
        </div>
        <span class="oo-ui-actionFieldLayout-button">
          <a>
            <span class="ct-icon ct-icon-flip"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M13 19H1V7h6V1h12v12h-6zm-6-6V9H3v8h8v-4zm2-2h8V3H9z"/></g></svg></span>
            <span class="oo-ui-labelElement-label">نسخ</span>
          </a>
        </span>
      </div>
    </div>

    <div class="upload-field">
      <label>للربط به في HTML، انسخ عنوان URL هذا:</label>
      <div class="oo-ui-actionFieldLayout">
        <div class="oo-ui-actionFieldLayout-input">
          <input type="text" readonly value="https://commons.wikimedia.org/wiki/File:Graham_McAllister_at_UX_Brighton_2010_(5009349106)_cropped.jpg">
        </div>
        <span class="oo-ui-actionFieldLayout-button">
          <a>
            <span class="ct-icon ct-icon-flip"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M13 19H1V7h6V1h12v12h-6zm-6-6V9H3v8h8v-4zm2-2h8V3H9z"/></g></svg></span>
            <span class="oo-ui-labelElement-label">نسخ</span>
          </a>
        </span>
      </div>
    </div>
  </div>

  <hr>

  <h2>LTR comparison</h2>

  <div class="upload-card">
    <a class="upload-success-block" href="#">
      <span class="ct-icon"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M10 1a9 9 0 110 18 9 9 0 010-18M8.823 11.118 6.8 9.6l-1.2 1.6 2.8 2.1 1.381-.175 4.624-5.781-1.561-1.25z"/></g></svg></span>
      <span class="upload-success-copy">
        <strong>Upload successful</strong>
        <span>File has been uploaded to Commons</span>
      </span>
    </a>

    <div class="upload-field">
      <label>File name</label>
      <div class="oo-ui-actionFieldLayout">
        <div class="oo-ui-actionFieldLayout-input">
          <input type="text" readonly value="Graham_McAllister_at_UX_Brighton_2010_(5009349106)_cropped.jpg">
        </div>
        <span class="oo-ui-actionFieldLayout-button">
          <a>
            <span class="ct-icon"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M13 19H1V7h6V1h12v12h-6zm-6-6V9H3v8h8v-4zm2-2h8V3H9z"/></g></svg></span>
            <span class="oo-ui-labelElement-label">Copy</span>
          </a>
        </span>
      </div>
    </div>

    <div class="upload-field">
      <label>To use the file in a wiki, copy this text into a page:</label>
      <div class="oo-ui-actionFieldLayout">
        <div class="oo-ui-actionFieldLayout-input">
          <input class="monospace" type="text" readonly value="[[File:Graham_McAllister_at_UX_Brighton_2010_(5009349106)_cropped.jpg|thumb|Dr Graham McAllister at UX Brighton 2010]]">
        </div>
        <span class="oo-ui-actionFieldLayout-button">
          <a>
            <span class="ct-icon"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M13 19H1V7h6V1h12v12h-6zm-6-6V9H3v8h8v-4zm2-2h8V3H9z"/></g></svg></span>
            <span class="oo-ui-labelElement-label">Copy</span>
          </a>
        </span>
      </div>
    </div>

    <div class="upload-field">
      <label>To link to it in HTML, copy this URL:</label>
      <div class="oo-ui-actionFieldLayout">
        <div class="oo-ui-actionFieldLayout-input">
          <input type="text" readonly value="https://commons.wikimedia.org/wiki/File:Graham_McAllister_at_UX_Brighton_2010_(5009349106)_cropped.jpg">
        </div>
        <span class="oo-ui-actionFieldLayout-button">
          <a>
            <span class="ct-icon"><svg viewBox="0 0 20 20" focusable="false"><g><path d="M13 19H1V7h6V1h12v12h-6zm-6-6V9H3v8h8v-4zm2-2h8V3H9z"/></g></svg></span>
            <span class="oo-ui-labelElement-label">Copy</span>
          </a>
        </span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
